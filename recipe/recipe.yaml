schema_version: 1

context:
  name: kagglesdk
  version: "0.1.19"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/kagglesdk-${{ version }}.tar.gz
  sha256: ce78fb0ede3e2fdbe7c6bd8924cd1830505b35bd245366d620e72974a116d258

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - requests
    - protobuf

tests:
  - python:
      imports:
        - kagglesdk
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  homepage: https://github.com/Kaggle/kagglesdk
  repository: https://github.com/Kaggle/kagglesdk
  summary: Bindings to access kaggle's external-facing APIs
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - synapticarbors
